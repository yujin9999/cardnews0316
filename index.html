<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리동작 카드뉴스</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f2f4f8;
  text-align:center;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:20px;
}

.card-image{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:20px;
}

.slide{
  display:none;
  background:white;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.slide.active{
  display:block;
}

.controls{
  margin:20px 0;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
}

.secondary{background:#6c757d;}
.danger{background:#dc3545;}

.status{
  font-size:13px;
  color:#444;
}

.sr-only{
  position:absolute;
  width:1px;
  height:1px;
  overflow:hidden;
}
</style>
</head>

<body>

<div class="wrap">

<h1>우리동작 카드뉴스</h1>

<div class="guide" id="autoplay-guide">
자동 재생 버튼을 누르면 음성이 재생됩니다.
</div>

<!-- 1페이지 -->
<div class="slide active">
<img src="images/card1.png" class="card-image">
<p class="sr-only">웹진 안내</p>
</div>

<!-- 2~5 생략 (기존 그대로 유지하면 됨) -->

<!-- 6페이지 -->
<div class="slide">
<img src="images/card6.png" class="card-image">
<p class="sr-only">사업 안내</p>
</div>

<!-- 7페이지 -->
<div class="slide" style="position:relative;">
<img src="images/card7.png" class="card-image">

<a href="https://naver.me/IIDvI4Rx"
target="_blank"
style="
position:absolute;
left:50%;
bottom:7%;
transform:translateX(-50%);
background:#2c7be5;
color:white;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
"
aria-label="정답 제출 페이지로 이동">
정답 제출하기
</a>

<p class="sr-only">웹진 이벤트 참여</p>
</div>

<!-- 8페이지 -->
<div class="slide" style="position:relative;">
<img src="images/card8.png" class="card-image">

<a href="http://www.wdcil.org/bbs/board.php?bo_table=notice&wr_id=1049"
target="_blank"
style="
position:absolute;
left:50%;
bottom:7%;
transform:translateX(-50%);
background:#28a745;
color:white;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
"
aria-label="사업 상세 페이지로 이동">
사업 자세히 보기
</a>

<p class="sr-only">기관 안내</p>
</div>

<!-- 버튼 -->
<div class="controls">
<button onclick="prevSlide()">이전</button>
<button id="autoplayBtn" onclick="startAutoPlay()">자동 재생 시작</button>
<button class="secondary" onclick="speak()">현재 듣기</button>
<button class="danger" onclick="stop()">정지</button>
<button onclick="nextSlide()">다음</button>
</div>

<div id="status" class="status" aria-live="polite">대기 중</div>

</div>

<script>
let current=0;
const slides=document.querySelectorAll(".slide");
let audio=null;
let auto=false;

function show(i){
slides.forEach((s,idx)=>s.classList.toggle("active",idx===i));
current=i;
}

function nextSlide(){
stop();
show((current+1)%slides.length);
}

function prevSlide(){
stop();
show((current-1+slides.length)%slides.length);
}

function play(i,cb){
if(audio){audio.pause();}
audio=new Audio(`audio/card${i+1}.mp3`);
audio.onended=cb;
audio.play();
}

function speak(){
auto=false;
play(current);
}

function startAutoPlay(){
auto=true;
loop();
}

function loop(){
if(!auto)return;
play(current,()=>{
if(current<slides.length-1){
show(current+1);
setTimeout(loop,800);
}else{
auto=false;
}
});
}

function stop(){
auto=false;
if(audio){audio.pause();}
}
</script>

</body>
</html>
